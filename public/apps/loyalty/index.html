<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Diyama Loyalty · Digital Stamp Cards</title>
<meta name="description" content="Diyama Loyalty is a delightful digital stamp card creator for cafes and shops. Reward loyal customers, track stamps, and unlock rewards. Built by Diyama Solutions." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%231f5c4d'/%3E%3Ctext x='50' y='68' font-size='54' text-anchor='middle' fill='%23e8a838'%3E%E2%98%85%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --teal: #1f5c4d;
  --teal-dark: #16453a;
  --teal-soft: #e7f0ed;
  --gold: #e8a838;
  --gold-soft: #fbf1dd;
  --ink: #1e2b30;
  --muted: #6b7674;
  --surface: #faf8f4;
  --card: #ffffff;
  --border: #e8e4dc;
  --danger: #d64545;
  --ok: #2e9e6b;
  --accent: var(--gold); /* customizable brand accent */
  --shadow: 0 10px 30px -12px rgba(31,92,77,.15);
  --shadow-lg: 0 22px 50px -18px rgba(31,92,77,.32);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--surface);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background:
    radial-gradient(560px 460px at 100% 0%, rgba(232,168,56,.13), transparent 60%),
    radial-gradient(620px 520px at 0% 100%, rgba(31,92,77,.12), transparent 62%);
}
h1, h2, h3, .font-display { font-family: 'Playfair Display', serif; }

/* ---------- Header ---------- */
header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(255,255,255,.78);
  backdrop-filter: saturate(1.4) blur(12px);
  -webkit-backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.wordmark { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.wordmark .brand {
  font-family: 'Playfair Display', serif;
  font-weight: 800;
  font-size: 1.42rem;
  color: var(--teal);
  letter-spacing: -.01em;
}
.wordmark .brand .dot { color: var(--gold); }
.wordmark .divider { width: 1px; height: 22px; background: var(--border); }
.wordmark .app-name {
  font-size: .82rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.header-action {
  font-size: .84rem;
  font-weight: 600;
  color: var(--teal);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  transition: .18s ease;
  white-space: nowrap;
}
.header-action:hover { transform: translateY(-1px); box-shadow: var(--shadow); border-color: var(--teal-soft); }

/* ---------- Layout ---------- */
main { max-width: 1080px; margin: 0 auto; padding: 28px 20px 64px; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: .74rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--teal); background: var(--teal-soft);
  padding: 6px 12px; border-radius: 999px; margin-bottom: 14px;
}
.eyebrow .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
.hero h1 { font-size: clamp(1.9rem, 6vw, 2.7rem); font-weight: 800; line-height: 1.1; letter-spacing: -.015em; }
.hero p.sub { color: var(--muted); margin-top: 10px; max-width: 62ch; font-size: 1.02rem; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 22px;
}
.grid-2 { display: grid; grid-template-columns: 1fr; gap: 22px; }
@media (min-width: 860px) { .grid-2 { grid-template-columns: 340px 1fr; align-items: start; } }

/* ---------- Buttons ---------- */
.btn {
  font-family: inherit; font-size: .95rem; font-weight: 600;
  border: none; border-radius: 10px; cursor: pointer;
  padding: 11px 18px; transition: .18s ease;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: translateY(0) !important; box-shadow: none !important; }
.btn-primary { background: var(--teal); color: #fff; }
.btn-primary:hover { background: var(--teal-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
.btn-accent { background: var(--accent); color: var(--ink); }
.btn-accent:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -10px color-mix(in srgb, var(--accent) 70%, transparent); filter: brightness(1.03); }
.btn-outline { background: var(--card); color: var(--teal); border: 1px solid var(--border); }
.btn-outline:hover { transform: translateY(-1px); box-shadow: var(--shadow); border-color: var(--teal-soft); }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--danger); }
.btn-sm { padding: 8px 13px; font-size: .85rem; border-radius: 9px; }
.btn-block { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ---------- Inputs ---------- */
label.field { display: block; margin-bottom: 14px; }
label.field .lbl { display: block; font-size: .82rem; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
input[type=text], input[type=tel], input[type=number], select {
  width: 100%; font-family: inherit; font-size: .95rem; color: var(--ink);
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 13px; transition: .18s ease;
}
input:focus, select:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(31,92,77,.15); background: #fff; }
.hint { font-size: .78rem; color: var(--muted); margin-top: 5px; }

/* color swatches */
.swatches { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 34px; height: 34px; border-radius: 9px; cursor: pointer; border: 2px solid transparent;
  transition: .16s ease; position: relative;
}
.swatch:hover { transform: translateY(-2px) scale(1.05); }
.swatch.sel { border-color: var(--ink); box-shadow: 0 0 0 3px #fff, 0 0 0 4px var(--ink); }

/* ---------- Stamp card ---------- */
.stampcard {
  position: relative;
  border-radius: 20px;
  padding: 24px;
  background:
    linear-gradient(155deg, color-mix(in srgb, var(--accent) 12%, #fff), #fff 60%),
    var(--card);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: .3s ease;
}
.stampcard.full {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent), var(--shadow-lg);
}
.stampcard .sc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 6px; }
.stampcard .biz { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 1.35rem; color: var(--teal); line-height: 1.1; }
.stampcard .reward-line { font-size: .9rem; color: var(--muted); margin-top: 3px; }
.stampcard .reward-line b { color: var(--ink); }
.sc-badge {
  flex-shrink: 0; font-size: .74rem; font-weight: 700; letter-spacing: .05em;
  padding: 6px 11px; border-radius: 999px; background: var(--teal-soft); color: var(--teal);
  text-transform: uppercase; white-space: nowrap;
}
.customer-tag {
  display: inline-flex; align-items: center; gap: 7px; margin: 14px 0 4px;
  font-size: .9rem; font-weight: 600; color: var(--ink);
}
.customer-tag .av {
  width: 26px; height: 26px; border-radius: 50%; background: var(--teal); color: #fff;
  display: grid; place-items: center; font-size: .78rem; font-weight: 700;
}

.stamp-grid { display: grid; gap: 12px; margin: 18px 0 6px; }
.stamp {
  aspect-ratio: 1; border-radius: 50%;
  border: 2px dashed color-mix(in srgb, var(--teal) 26%, var(--border));
  background: var(--surface);
  display: grid; place-items: center; cursor: pointer;
  position: relative; transition: transform .16s ease, background .2s ease, border-color .2s ease;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.stamp .num { font-size: .78rem; font-weight: 700; color: color-mix(in srgb, var(--teal) 45%, var(--muted)); transition: opacity .2s; }
.stamp svg { width: 54%; height: 54%; opacity: 0; transform: scale(.3) rotate(-25deg); transition: none; }
.stamp:not(.filled):hover { border-color: var(--teal); background: var(--teal-soft); transform: translateY(-2px); }
.stamp.filled {
  cursor: default; border: 2px solid transparent;
  background: radial-gradient(circle at 32% 28%, color-mix(in srgb, var(--accent) 78%, #fff), var(--accent) 72%);
  box-shadow: inset 0 2px 5px rgba(255,255,255,.5), 0 4px 10px -4px color-mix(in srgb, var(--accent) 60%, transparent);
}
.stamp.filled .num { opacity: 0; }
.stamp.filled svg { opacity: 1; transform: scale(1) rotate(0); color: var(--ink); filter: drop-shadow(0 1px 1px rgba(0,0,0,.12)); }
.stamp.pop { animation: stampPop .42s cubic-bezier(.34,1.56,.64,1); }
@keyframes stampPop {
  0% { transform: scale(.3) rotate(-18deg); }
  55% { transform: scale(1.22) rotate(6deg); }
  100% { transform: scale(1) rotate(0); }
}
.stamp.pop svg { animation: inkIn .42s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes inkIn { 0% { opacity: 0; transform: scale(.2) rotate(-30deg); } 60% { opacity: 1; transform: scale(1.15) rotate(4deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
.stamp.ring::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  border: 2px solid var(--accent); opacity: 0; animation: ringOut .5s ease-out;
}
@keyframes ringOut { 0% { opacity: .7; transform: scale(.9); } 100% { opacity: 0; transform: scale(1.7); } }

.progress-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; }
.progress-txt { font-size: .88rem; color: var(--muted); font-weight: 500; }
.progress-txt b { color: var(--ink); }
.bar { height: 8px; background: var(--teal-soft); border-radius: 99px; overflow: hidden; flex: 1; }
.bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--teal), var(--accent)); border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* reward unlocked overlay */
.reward-banner {
  margin-top: 18px; text-align: center; border-radius: 16px; padding: 20px;
  background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent) 22%, #fff), #fff);
  border: 1px solid var(--accent);
  animation: glowPulse 2.2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 0%, transparent); }
  50% { box-shadow: 0 0 26px -4px color-mix(in srgb, var(--accent) 55%, transparent); }
}
.reward-banner .rb-emoji { font-size: 2.1rem; line-height: 1; }
.reward-banner h3 { font-size: 1.35rem; color: var(--teal); margin-top: 6px; }
.reward-banner p { color: var(--muted); font-size: .92rem; margin: 4px 0 14px; }

/* ---------- Customer selector / list ---------- */
.section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 30px 0 14px; }
.section-head h2 { font-size: 1.28rem; font-weight: 700; }
.cust-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.chip {
  border: 1px solid var(--border); background: var(--card); color: var(--ink);
  padding: 8px 14px; border-radius: 999px; cursor: pointer; font-family: inherit;
  font-size: .88rem; font-weight: 600; transition: .16s ease; display: inline-flex; align-items: center; gap: 8px;
}
.chip:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.chip.active { background: var(--teal); color: #fff; border-color: var(--teal); }
.chip .mini-prog { font-size: .74rem; font-weight: 700; opacity: .85; }
.chip.active .mini-prog { color: var(--gold-soft); }

.cust-table { width: 100%; border-collapse: collapse; }
.cust-row {
  display: grid; grid-template-columns: 1fr auto auto; gap: 12px; align-items: center;
  padding: 13px 4px; border-bottom: 1px solid var(--border);
}
.cust-row:last-child { border-bottom: none; }
.cust-name { font-weight: 600; display: flex; align-items: center; gap: 10px; }
.cust-name .av {
  width: 34px; height: 34px; border-radius: 50%; background: var(--teal-soft); color: var(--teal);
  display: grid; place-items: center; font-weight: 700; font-size: .85rem; flex-shrink: 0;
}
.cust-name .meta { font-size: .78rem; color: var(--muted); font-weight: 500; }
.cust-stat { text-align: center; min-width: 62px; }
.cust-stat .n { font-weight: 700; font-size: 1.05rem; color: var(--ink); }
.cust-stat .l { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.mini-dots { display: flex; gap: 3px; margin-top: 4px; }
.mini-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
.mini-dots i.on { background: var(--accent); }

/* stat tiles */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 4px; }
.stat-tile { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 15px; text-align: center; }
.stat-tile .n { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 1.7rem; color: var(--teal); line-height: 1; }
.stat-tile .l { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 6px; }

/* empty state */
.empty { text-align: center; padding: 44px 20px; }
.empty .em { font-size: 2.6rem; }
.empty h3 { font-size: 1.25rem; margin: 12px 0 6px; }
.empty p { color: var(--muted); max-width: 42ch; margin: 0 auto 18px; }

/* ---------- Modal ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 100; display: none;
  background: rgba(20,35,32,.42); backdrop-filter: blur(3px);
  align-items: flex-end; justify-content: center; padding: 0;
}
.overlay.open { display: flex; animation: fade .2s ease; }
@media (min-width: 640px) { .overlay { align-items: center; padding: 20px; } }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--card); width: 100%; max-width: 440px;
  border-radius: 20px 20px 0 0; padding: 24px; box-shadow: var(--shadow-lg);
  animation: slideUp .28s cubic-bezier(.16,1,.3,1);
}
@media (min-width: 640px) { .modal { border-radius: 20px; } }
@keyframes slideUp { from { transform: translateY(24px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
.modal h3 { font-size: 1.3rem; margin-bottom: 4px; }
.modal .msub { color: var(--muted); font-size: .9rem; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 10px; margin-top: 6px; }

/* toast */
#toast {
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(120%);
  background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 12px;
  font-size: .9rem; font-weight: 500; z-index: 200; box-shadow: var(--shadow-lg);
  transition: transform .3s cubic-bezier(.16,1,.3,1); max-width: 90vw; text-align: center;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* confetti */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 150; }

/* fade-in on load */
.reveal { opacity: 0; transform: translateY(10px); animation: reveal .5s ease forwards; }
@keyframes reveal { to { opacity: 1; transform: translateY(0); } }

/* footer */
footer {
  border-top: 1px solid var(--border); margin-top: 20px;
  padding: 26px 20px 34px; text-align: center; color: var(--muted); font-size: .84rem;
}
footer a { color: var(--teal); text-decoration: none; font-weight: 600; }
footer a:hover { text-decoration: underline; }
footer .sep { margin: 0 8px; opacity: .5; }
footer .tag { font-family: 'Playfair Display', serif; font-style: italic; }

.link-reset { background: none; border: none; color: var(--muted); font-family: inherit; font-size: .82rem; cursor: pointer; text-decoration: underline; }
.link-reset:hover { color: var(--danger); }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="wordmark" href="https://www.diyama.online" target="_blank" rel="noopener" aria-label="Diyama Solutions home">
      <span class="brand">Diyama<span class="dot">.</span></span>
      <span class="divider"></span>
      <span class="app-name">Loyalty</span>
    </a>
    <button class="header-action" id="editSetupBtn" type="button">Card settings</button>
  </div>
</header>

<main id="app"></main>

<footer>
  <div>
    Built by <a href="https://www.diyama.online" target="_blank" rel="noopener">Diyama Solutions</a>
    <span class="sep">·</span>
    <span class="tag">Clarity in Action.</span>
  </div>
  <div style="margin-top:8px">
    <a href="https://wa.me/260966138238" target="_blank" rel="noopener">Chat on WhatsApp</a>
  </div>
</footer>

<!-- Setup modal -->
<div class="overlay" id="setupOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="setupTitle">
    <h3 id="setupTitle" class="font-display">Set up your card</h3>
    <p class="msub">These details print on every customer's loyalty card.</p>
    <form id="setupForm">
      <label class="field">
        <span class="lbl">Business name</span>
        <input type="text" id="f_biz" placeholder="e.g. Lusaka Bean Cafe" maxlength="40" required />
      </label>
      <label class="field">
        <span class="lbl">Reward description</span>
        <input type="text" id="f_reward" placeholder="e.g. Free coffee" maxlength="60" required />
      </label>
      <label class="field">
        <span class="lbl">Stamps required to earn it</span>
        <input type="number" id="f_stamps" min="2" max="20" value="8" required />
        <span class="hint">Choose between 2 and 20 stamps.</span>
      </label>
      <label class="field">
        <span class="lbl">Accent color</span>
        <div class="swatches" id="swatches"></div>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="setupCancel">Cancel</button>
        <button type="submit" class="btn btn-primary btn-block">Save card</button>
      </div>
    </form>
  </div>
</div>

<!-- Add customer modal -->
<div class="overlay" id="custOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="custTitle">
    <h3 id="custTitle" class="font-display">Add a customer</h3>
    <p class="msub">Give this customer their own loyalty card.</p>
    <form id="custForm">
      <label class="field">
        <span class="lbl">Name</span>
        <input type="text" id="c_name" placeholder="e.g. Mwape Banda" maxlength="40" required />
      </label>
      <label class="field">
        <span class="lbl">Phone <span style="color:var(--muted);font-weight:400">(optional)</span></span>
        <input type="tel" id="c_phone" placeholder="e.g. 097 000 0000" maxlength="20" />
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="custCancel">Cancel</button>
        <button type="submit" class="btn btn-primary btn-block">Add customer</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<canvas id="confetti"></canvas>

<script>
(function () {
  "use strict";

  const KEY = "diyama_loyalty_v1";
  const PALETTE = ["#e8a838", "#1f5c4d", "#d64545", "#7b5ea7", "#2e9e6b", "#e07a3f", "#2f7db8", "#c94f8a"];

  const defaultState = () => ({
    setup: null, // {biz, reward, stamps, accent}
    customers: [], // {id, name, phone, count, redeemed, created}
    activeId: null
  });

  let state = load();

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) return Object.assign(defaultState(), JSON.parse(raw));
    } catch (e) {}
    return defaultState();
  }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  const initials = (n) => n.trim().split(/\s+/).slice(0, 2).map((w) => w[0] || "").join("").toUpperCase() || "?";

  const app = document.getElementById("app");
  const $ = (id) => document.getElementById(id);

  // apply accent to CSS var
  function applyAccent() {
    document.documentElement.style.setProperty("--accent", state.setup ? state.setup.accent : "#e8a838");
  }

  const STAMP_SVG = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2.2l2.66 5.86 6.34.62-4.77 4.2 1.4 6.24L12 16.9l-5.63 2.42 1.4-6.24-4.77-4.2 6.34-.62z"/></svg>';

  /* ---------------- Render ---------------- */
  function render() {
    applyAccent();
    if (!state.setup) return renderWelcome();
    return renderDashboard();
  }

  function renderWelcome() {
    app.innerHTML = `
      <section class="hero reveal" style="text-align:center;padding:26px 0 30px">
        <span class="eyebrow"><span class="pip"></span>Digital stamp cards</span>
        <h1>Turn regulars into<br/>loyal fans.</h1>
        <p class="sub" style="margin:12px auto 0">Create a beautiful digital loyalty card for your cafe or shop in seconds. Stamp customers on every visit, and delight them when they unlock a reward.</p>
        <div style="margin-top:22px">
          <button class="btn btn-primary" id="startBtn" style="padding:13px 26px;font-size:1rem">Create your card</button>
        </div>
      </section>
      <div class="card reveal" style="animation-delay:.08s;max-width:560px;margin:8px auto 0">
        <div class="empty">
          <div class="em">☕️✨</div>
          <h3 class="font-display">No card yet</h3>
          <p>Set your business name, the reward you offer, and how many stamps it takes. Your customers get their own cards to fill.</p>
          <button class="btn btn-accent" id="startBtn2">Get started</button>
        </div>
      </div>`;
    $("startBtn").onclick = openSetup;
    $("startBtn2").onclick = openSetup;
  }

  function renderDashboard() {
    const s = state.setup;
    const totalStamps = state.customers.reduce((a, c) => a + c.count + c.redeemed * s.stamps, 0);
    const totalRedeemed = state.customers.reduce((a, c) => a + c.redeemed, 0);

    app.innerHTML = `
      <section class="hero reveal">
        <span class="eyebrow"><span class="pip"></span>${esc(s.biz)}</span>
        <h1>Loyalty cards</h1>
        <p class="sub">Tap a stamp on each visit. Fill the card to unlock <b>${esc(s.reward)}</b>.</p>
      </section>

      <div class="stats reveal" style="animation-delay:.05s;margin-top:20px">
        <div class="stat-tile"><div class="n">${state.customers.length}</div><div class="l">Customers</div></div>
        <div class="stat-tile"><div class="n">${totalStamps}</div><div class="l">Stamps given</div></div>
        <div class="stat-tile"><div class="n">${totalRedeemed}</div><div class="l">Rewards redeemed</div></div>
      </div>

      <div class="grid-2" style="margin-top:24px">
        <div class="reveal" style="animation-delay:.1s">
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
              <h2 style="font-size:1.05rem;font-weight:700" class="font-display">Customers</h2>
              <button class="btn btn-accent btn-sm" id="addCustBtn">+ Add</button>
            </div>
            <div id="custPicker"></div>
          </div>
        </div>
        <div class="reveal" style="animation-delay:.15s" id="cardCol"></div>
      </div>

      <div class="section-head reveal" style="animation-delay:.2s">
        <h2 class="font-display">All customers</h2>
        ${state.customers.length ? `<button class="link-reset" id="clearAllBtn">Reset everything</button>` : ""}
      </div>
      <div class="card reveal" style="animation-delay:.22s" id="custList"></div>
    `;

    $("addCustBtn").onclick = openCust;
    if ($("clearAllBtn")) $("clearAllBtn").onclick = confirmClearAll;

    renderPicker();
    renderActiveCard();
    renderList();
  }

  function renderPicker() {
    const el = $("custPicker");
    if (!el) return;
    if (!state.customers.length) {
      el.innerHTML = `<p style="color:var(--muted);font-size:.9rem">No customers yet. Add your first one to start stamping.</p>`;
      return;
    }
    const s = state.setup;
    el.innerHTML = `<div class="cust-picker">` + state.customers.map((c) => {
      const full = c.count >= s.stamps;
      return `<button class="chip ${c.id === state.activeId ? "active" : ""}" data-pick="${c.id}">
        ${esc(c.name)} <span class="mini-prog">${full ? "★ ready" : c.count + "/" + s.stamps}</span>
      </button>`;
    }).join("") + `</div>`;
    el.querySelectorAll("[data-pick]").forEach((b) => {
      b.onclick = () => { state.activeId = b.dataset.pick; save(); renderPicker(); renderActiveCard(); };
    });
  }

  function renderActiveCard() {
    const col = $("cardCol");
    if (!col) return;
    const s = state.setup;
    if (!state.customers.length) {
      col.innerHTML = `
        <div class="card">
          <div class="empty">
            <div class="em">🎫</div>
            <h3 class="font-display">Your card preview</h3>
            <p>Add a customer to create their loyalty card. Each customer collects their own stamps toward <b>${esc(s.reward)}</b>.</p>
            <button class="btn btn-primary" id="emptyAdd">Add first customer</button>
          </div>
        </div>`;
      $("emptyAdd").onclick = openCust;
      return;
    }
    const c = state.customers.find((x) => x.id === state.activeId) || state.customers[0];
    state.activeId = c.id;
    const full = c.count >= s.stamps;
    const cols = s.stamps <= 6 ? Math.min(s.stamps, 3) : (s.stamps <= 12 ? 4 : 5);

    let slots = "";
    for (let i = 0; i < s.stamps; i++) {
      const filled = i < c.count;
      slots += `<div class="stamp ${filled ? "filled" : ""}" data-slot="${i}" role="button" tabindex="0"
        aria-label="Stamp ${i + 1} of ${s.stamps}${filled ? ", filled" : ", empty, tap to stamp"}">
        <span class="num">${i + 1}</span>${STAMP_SVG}</div>`;
    }

    const pct = Math.round((c.count / s.stamps) * 100);

    col.innerHTML = `
      <div class="stampcard ${full ? "full" : ""}" id="theCard">
        <div class="sc-top">
          <div>
            <div class="biz">${esc(s.biz)}</div>
            <div class="reward-line">Collect ${s.stamps} stamps for <b>${esc(s.reward)}</b></div>
          </div>
          <span class="sc-badge">${c.redeemed ? c.redeemed + "× earned" : "Loyalty"}</span>
        </div>
        <div class="customer-tag"><span class="av">${esc(initials(c.name))}</span>${esc(c.name)}${c.phone ? ` <span style="color:var(--muted);font-weight:500">· ${esc(c.phone)}</span>` : ""}</div>
        <div class="stamp-grid" style="grid-template-columns:repeat(${cols},1fr)" id="stampGrid">${slots}</div>
        <div class="progress-row">
          <div class="bar"><span style="width:${pct}%"></span></div>
          <div class="progress-txt"><b>${c.count}</b> / ${s.stamps}</div>
        </div>
        ${full ? `
          <div class="reward-banner">
            <div class="rb-emoji">🎉</div>
            <h3 class="font-display">Reward unlocked!</h3>
            <p>${esc(c.name)} has earned <b>${esc(s.reward)}</b>. Hand it over and start a fresh card.</p>
            <button class="btn btn-accent btn-block" id="redeemBtn">Redeem reward</button>
          </div>` : `
          <div style="margin-top:14px">
            <button class="btn btn-outline btn-sm" id="undoBtn" ${c.count === 0 ? "disabled" : ""}>Undo last stamp</button>
          </div>`}
      </div>`;

    // wire stamps
    col.querySelectorAll("[data-slot]").forEach((slot) => {
      const idx = +slot.dataset.slot;
      const act = () => addStamp(c.id, idx, slot);
      slot.addEventListener("click", act);
      slot.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); act(); } });
    });
    if ($("redeemBtn")) $("redeemBtn").onclick = () => redeem(c.id);
    if ($("undoBtn")) $("undoBtn").onclick = () => undoStamp(c.id);
  }

  function renderList() {
    const el = $("custList");
    if (!el) return;
    const s = state.setup;
    if (!state.customers.length) {
      el.innerHTML = `<div class="empty" style="padding:30px 10px">
        <div class="em">👋</div>
        <h3 class="font-display">No customers yet</h3>
        <p>When you add customers they show up here with their live progress and rewards earned.</p>
      </div>`;
      return;
    }
    el.innerHTML = state.customers.map((c) => {
      const full = c.count >= s.stamps;
      let dots = "";
      const shown = Math.min(s.stamps, 10);
      for (let i = 0; i < shown; i++) dots += `<i class="${i < c.count ? "on" : ""}"></i>`;
      return `<div class="cust-row">
        <div class="cust-name">
          <span class="av">${esc(initials(c.name))}</span>
          <div>
            <div>${esc(c.name)}${full ? ` <span style="color:var(--accent)">★</span>` : ""}</div>
            <div class="meta">${c.phone ? esc(c.phone) + " · " : ""}${c.count}/${s.stamps} stamps</div>
            <div class="mini-dots">${dots}</div>
          </div>
        </div>
        <div class="cust-stat"><div class="n">${c.redeemed}</div><div class="l">Earned</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" data-open="${c.id}">Open</button>
          <button class="btn btn-ghost btn-sm" data-del="${c.id}" aria-label="Remove ${esc(c.name)}">✕</button>
        </div>
      </div>`;
    }).join("");
    el.querySelectorAll("[data-open]").forEach((b) => b.onclick = () => {
      state.activeId = b.dataset.open; save(); renderPicker(); renderActiveCard();
      document.getElementById("theCard").scrollIntoView({ behavior: "smooth", block: "center" });
    });
    el.querySelectorAll("[data-del]").forEach((b) => b.onclick = () => removeCustomer(b.dataset.del));
  }

  /* ---------------- Actions ---------------- */
  function addStamp(id, idx, slotEl) {
    const c = state.customers.find((x) => x.id === id);
    if (!c || c.count >= state.setup.stamps) return;
    // only allow stamping the next empty slot (or any empty slot maps to +1)
    if (idx !== c.count) {
      // tapping any empty slot fills the next available one for forgiving UX
      if (idx < c.count) return; // already filled
    }
    c.count = Math.min(c.count + 1, state.setup.stamps);
    save();

    // animate the just-filled slot in place, then re-render for full-state UI
    const grid = document.getElementById("stampGrid");
    const target = grid ? grid.children[c.count - 1] : null;
    if (target) {
      target.classList.add("filled", "pop", "ring");
      haptic();
      setTimeout(() => {
        renderPicker();
        if (c.count >= state.setup.stamps) { celebrate(); renderActiveCard(); }
        else { updateProgressInline(c); }
        renderList();
      }, 300);
    } else {
      renderActiveCard(); renderPicker(); renderList();
      if (c.count >= state.setup.stamps) celebrate();
    }
  }

  function updateProgressInline(c) {
    const s = state.setup;
    const pct = Math.round((c.count / s.stamps) * 100);
    const bar = document.querySelector("#theCard .bar > span");
    const txt = document.querySelector("#theCard .progress-txt");
    const undo = document.getElementById("undoBtn");
    if (bar) bar.style.width = pct + "%";
    if (txt) txt.innerHTML = `<b>${c.count}</b> / ${s.stamps}`;
    if (undo) undo.disabled = c.count === 0;
  }

  function undoStamp(id) {
    const c = state.customers.find((x) => x.id === id);
    if (!c || c.count <= 0) return;
    c.count--; save();
    renderActiveCard(); renderPicker(); renderList();
  }

  function redeem(id) {
    const c = state.customers.find((x) => x.id === id);
    if (!c) return;
    c.redeemed++; c.count = 0; save();
    toast("Reward redeemed. Fresh card started for " + c.name + " 🎉");
    renderDashboard();
  }

  function removeCustomer(id) {
    const c = state.customers.find((x) => x.id === id);
    if (!c) return;
    if (!confirm("Remove " + c.name + "? Their loyalty progress will be deleted.")) return;
    state.customers = state.customers.filter((x) => x.id !== id);
    if (state.activeId === id) state.activeId = state.customers[0] ? state.customers[0].id : null;
    save(); renderDashboard();
    toast(c.name + " removed");
  }

  function confirmClearAll() {
    if (!confirm("Reset everything? This deletes your card setup and all customers.")) return;
    state = defaultState(); save(); render();
    toast("All data cleared");
  }

  /* ---------------- Modals ---------------- */
  let editingSetup = false;
  function openSetup() {
    editingSetup = !!state.setup;
    const s = state.setup;
    $("f_biz").value = s ? s.biz : "";
    $("f_reward").value = s ? s.reward : "";
    $("f_stamps").value = s ? s.stamps : 8;
    buildSwatches(s ? s.accent : PALETTE[0]);
    openOverlay("setupOverlay");
    setTimeout(() => $("f_biz").focus(), 60);
  }
  let chosenAccent = PALETTE[0];
  function buildSwatches(sel) {
    chosenAccent = sel;
    const wrap = $("swatches");
    wrap.innerHTML = PALETTE.map((c) => `<div class="swatch ${c === sel ? "sel" : ""}" data-c="${c}" style="background:${c}" role="button" tabindex="0" aria-label="Accent ${c}"></div>`).join("");
    wrap.querySelectorAll("[data-c]").forEach((sw) => {
      sw.onclick = () => { chosenAccent = sw.dataset.c; wrap.querySelectorAll(".swatch").forEach((x) => x.classList.remove("sel")); sw.classList.add("sel"); };
    });
  }

  $("setupForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const biz = $("f_biz").value.trim();
    const reward = $("f_reward").value.trim();
    let stamps = parseInt($("f_stamps").value, 10);
    if (!biz || !reward) return;
    if (isNaN(stamps)) stamps = 8;
    stamps = Math.max(2, Math.min(20, stamps));
    const wasNew = !state.setup;
    state.setup = { biz, reward, stamps, accent: chosenAccent };
    // clamp existing customers if stamp count dropped
    state.customers.forEach((c) => { if (c.count > stamps) c.count = stamps; });
    save(); closeOverlay("setupOverlay"); render();
    toast(wasNew ? "Card created. Add your first customer!" : "Card settings saved");
  });
  $("setupCancel").onclick = () => closeOverlay("setupOverlay");

  function openCust() {
    $("c_name").value = ""; $("c_phone").value = "";
    openOverlay("custOverlay");
    setTimeout(() => $("c_name").focus(), 60);
  }
  $("custForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const name = $("c_name").value.trim();
    if (!name) return;
    const c = { id: uid(), name, phone: $("c_phone").value.trim(), count: 0, redeemed: 0, created: Date.now() };
    state.customers.push(c);
    state.activeId = c.id;
    save(); closeOverlay("custOverlay"); renderDashboard();
    toast(name + " added. Tap a stamp to begin!");
    setTimeout(() => { const el = document.getElementById("theCard"); if (el) el.scrollIntoView({ behavior: "smooth", block: "center" }); }, 120);
  });
  $("custCancel").onclick = () => closeOverlay("custOverlay");

  $("editSetupBtn").onclick = () => { if (state.setup) openSetup(); else openSetup(); };

  function openOverlay(id) { $(id).classList.add("open"); }
  function closeOverlay(id) { $(id).classList.remove("open"); }
  // close on backdrop click / Esc
  document.querySelectorAll(".overlay").forEach((ov) => {
    ov.addEventListener("click", (e) => { if (e.target === ov) ov.classList.remove("open"); });
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") document.querySelectorAll(".overlay.open").forEach((o) => o.classList.remove("open"));
  });

  /* ---------------- Delight ---------------- */
  let toastTimer;
  function toast(msg) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
  }

  function haptic() { if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} } }

  // Confetti
  const canvas = $("confetti");
  const ctx = canvas.getContext("2d");
  let pieces = [], rafId = null;
  function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener("resize", resizeCanvas); resizeCanvas();

  function celebrate() {
    haptic();
    const colors = [state.setup.accent, "#1f5c4d", "#e8a838", "#2e9e6b", "#ffffff"];
    for (let i = 0; i < 130; i++) {
      pieces.push({
        x: innerWidth / 2 + (Math.random() - 0.5) * 120,
        y: innerHeight / 2 - 40,
        vx: (Math.random() - 0.5) * 11,
        vy: Math.random() * -13 - 5,
        g: 0.32 + Math.random() * 0.12,
        size: 6 + Math.random() * 7,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 0.4,
        color: colors[(Math.random() * colors.length) | 0],
        life: 0
      });
    }
    toast("Reward unlocked! 🎉");
    if (!rafId) rafId = requestAnimationFrame(tick);
  }
  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces = pieces.filter((p) => p.life < 240 && p.y < innerHeight + 40);
    pieces.forEach((p) => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.rot += p.vr; p.life++;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, 1 - p.life / 240);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.62);
      ctx.restore();
    });
    if (pieces.length) rafId = requestAnimationFrame(tick);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); rafId = null; }
  }

  /* ---------------- Boot ---------------- */
  render();
})();
</script>
</body>
</html>
